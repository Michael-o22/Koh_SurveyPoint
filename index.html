<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koh Tung - Survey Point Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Core Libraries (ต้องโหลดตามลำดับนี้เพื่อป้องกันจอขาว) -->
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    
    <!-- Mapping Libraries -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.11.0/proj4.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+Thai:wght@300;400;700;800&family=JetBrains+Mono:wght@400;700&display=swap');
        
        body { 
            font-family: 'Inter', 'Noto Sans Thai', sans-serif; 
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            background: #fcfdfe;
        }
        .font-black { font-weight: 900; }
        .font-mono-custom { font-family: 'JetBrains Mono', monospace; }
        .shadow-premium { box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.04), 0 4px 10px -4px rgba(0, 0, 0, 0.02); }
        
        #map { height: 100%; width: 100%; border-radius: 2rem; z-index: 10; border: 1px solid #f1f5f9; background: #f1f5f9; }
        .map-container { height: calc(100vh - 120px); position: sticky; top: 40px; }
        
        /* ขยับตำแหน่งปุ่มควบคุมแผนที่ลงมาเพื่อไม่ให้ทับชื่อ Map */
        .leaflet-top.leaflet-left { 
            margin-top: 85px !important; 
            margin-left: 16px !important;
        }

        .leaflet-bar { 
            border: none !important; 
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1) !important;
            border-radius: 14px !important;
            overflow: hidden;
        }
        
        .leaflet-bar a, .leaflet-control-home-btn { 
            background-color: white !important; 
            color: #64748b !important; 
            border: none !important;
            border-bottom: 1px solid #f1f5f9 !important;
            width: 42px !important;
            height: 42px !important;
            line-height: 42px !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .leaflet-bar a:hover { background-color: #f8fafc !important; color: #2563eb !important; }

        .map-status-pill {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px);
            padding: 10px 18px; border-radius: 100px; border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 4px 20px rgba(0,0,0,0.06); display: flex; align-items: center; gap: 10px;
            pointer-events: none; user-select: none;
        }

        .leaflet-control-scale { margin-left: 20px !important; margin-bottom: 24px !important; }
        .leaflet-control-scale-line { 
            background: rgba(255, 255, 255, 0.8) !important; 
            backdrop-filter: blur(8px);
            border: 1.5px solid #94a3b8 !important; 
            border-top: none !important;
            color: #334155 !important;
            font-weight: 800 !important;
            font-size: 10px !important;
            border-radius: 0 0 4px 4px;
        }

        @media (max-width: 1024px) {
            .map-container { height: 480px; position: relative; top: 0; margin-bottom: 2rem; }
        }

        .no-horizontal-scroll {
            overflow-x: hidden !important;
        }
        
        .leaflet-popup-content-wrapper { border-radius: 1.5rem; padding: 6px; box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.3); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .table-row-hover:hover { background-color: #f8fafc; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;
        const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, PieChart, Pie, Cell } = Recharts;

        // กำหนด UTM Zone 47N
        proj4.defs("EPSG:32647", "+proj=utm +zone=47 +datum=WGS84 +units=m +no_defs");

        const BASE_SHEETS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRo7_oH2qCTWXlnejCHS7-4VAqmQasQ3oF3N2vBfiefz7xVFfZy3iamOwDH9bizLsUWcAaxZeIKZUxt/pub?gid=549658327&single=true&output=csv";
        
        // ชุดสี High Contrast Blue Harmony
        const RECEIVER_COLORS = ['#1e3a8a', '#0ea5e9', '#4f46e5', '#22d3ee', '#312e81', '#7dd3fc'];

        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                'minimal-gnss': (
                    <g transform="translate(1, 1) scale(0.92)">
                        <circle cx="12" cy="19" r="2.5" fill="white" />
                        <path d="M6 13C6 9.68629 8.68629 7 12 7C15.3137 7 18 9.68629 18 13" stroke="white" strokeWidth="3.5" strokeLinecap="round" strokeOpacity="0.8" />
                        <path d="M2 13C2 7.47715 6.47715 3 12 3C17.5228 3 22 7.47715 22 13" stroke="white" strokeWidth="3.5" strokeLinecap="round" strokeOpacity="0.4" />
                    </g>
                ),
                'refresh-cw': <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8m0 0V3m0 5h-5M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16m0 0v5m0-5h5"/>,
                'search': <><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></>,
                'calendar-days': <><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><path d="M16 2v4M8 2v4m-5 4h18m-13 4h.01m3.99 0h.01m3.99 0h.01m-12 4h.01m3.99 0h.01m3.99 0h.01"/></>,
                'database': <><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5V19A9 3 0 0 0 21 19V5M3 12A9 3 0 0 0 21 12"/></>,
                'map-pin': <><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></>,
                'external-link': <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6m4-3h6v6m-11 5L21 3"/>,
                'cloud-check': <><path d="M17.5 19h.5a4 4 0 0 0 0-8h-13.3A7 7 0 1 0 3 13a4 4 0 0 0 4 4h.5"/><path d="m9 13 2 2 4-4"/></>,
                'trending-up': <path d="m22 7-8.5 8.5-5-5L2 17M16 7h6v6"/>,
                'pie-chart': <><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></>,
                'filter': <path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3z"/>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        const App = () => {
            const [data, setData] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [filterDate, setFilterDate] = useState('All');
            const [filterType, setFilterType] = useState('All');
            const [loading, setLoading] = useState(true);
            const [lastUpdated, setLastUpdated] = useState(null);
            
            const mapRef = useRef(null);
            const markerGroupRef = useRef(null);

            const monthMap = { 'ม.ค.': 0, 'ก.พ.': 1, 'มี.ค.': 2, 'เม.ย.': 3, 'พ.ค.': 4, 'มิ.ย.': 5, 'ก.ค.': 6, 'ส.ค.': 7, 'ก.ย.': 8, 'ต.ค.': 9, 'พ.ย.': 10, 'ธ.ค.': 11 };

            const invalidateMap = () => {
                if (mapRef.current) {
                    setTimeout(() => mapRef.current.invalidateSize(), 500);
                }
            };

            const resetMapView = () => {
                if (mapRef.current && markerGroupRef.current) {
                    const layers = markerGroupRef.current.getLayers();
                    if (layers.length > 0) {
                        const bounds = L.featureGroup(layers).getBounds();
                        mapRef.current.fitBounds(bounds, { padding: [50, 50], maxZoom: 17 });
                    }
                }
            };

            useEffect(() => {
                if (!mapRef.current) {
                    const light = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; CartoDB' });
                    const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: 'Esri' });
                    const map = L.map('map', { center: [13.7367, 100.5231], zoom: 12, layers: [light], zoomControl: true });
                    
                    const baseMaps = { "Street Map": light, "Satellite": satellite };
                    L.control.layers(baseMaps, null, { position: 'topright' }).addTo(map);
                    L.control.scale({ position: 'bottomleft', metric: true, imperial: false }).addTo(map);
                    
                    const zoomContainer = map.zoomControl.getContainer();
                    const homeBtn = L.DomUtil.create('a', 'leaflet-control-home-btn', zoomContainer);
                    homeBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>';
                    homeBtn.href = '#'; homeBtn.title = 'Reset View';
                    
                    L.DomEvent.on(homeBtn, 'click', (e) => {
                        L.DomEvent.preventDefault(e);
                        resetMapView();
                    });

                    mapRef.current = map;
                    markerGroupRef.current = L.layerGroup().addTo(map);
                    invalidateMap();
                }
            }, []);

            const sanitizeUrl = (url) => {
                if (!url || typeof url !== 'string') return "";
                let clean = url.replace(/"/g, '').trim();
                const match = clean.match(/https?:\/\/[^\s]+/);
                return match ? match[0] : "";
            };

            const parseCSVLine = (line) => {
                const result = []; let curVal = ""; let inQuotes = false;
                for (let i = 0; i < line.length; i++) {
                    const char = line[i];
                    if (char === '"' && line[i+1] === '"') { curVal += '"'; i++; } 
                    else if (char === '"') { inQuotes = !inQuotes; } 
                    else if (char === ',' && !inQuotes) { result.push(curVal); curVal = ""; } 
                    else { curVal += char; }
                }
                result.push(curVal); return result;
            };

            const getSortValue = (dateStr) => {
                if (!dateStr) return 0;
                const parts = dateStr.split(/[-/\s]+/);
                const day = parseInt(parts[0]);
                const monthName = parts[1];
                const monthIdx = monthMap[monthName] || 0;
                return (monthIdx * 100) + day;
            };

            const standardizeData = (rawArray) => {
                return rawArray.map(item => {
                    const obj = { ...item };
                    const photoKey = Object.keys(obj).find(k => k.toLowerCase().includes('photo') || k.toLowerCase().includes('link') || k.includes('รูป'));
                    obj.DriveUrl = sanitizeUrl(obj[photoKey]);
                    
                    const reciverKey = Object.keys(obj).find(k => k.toLowerCase().includes('reciver') || k.toLowerCase().includes('receiver'));
                    obj.ReceiverNo = String(obj[reciverKey] || 'N/A').replace(/"/g, '');

                    ['North coordinate', 'East coordinate', 'Elevation'].forEach(key => {
                        if (obj[key] !== undefined) {
                            const numStr = String(obj[key]).replace(/,/g, '').replace(/"/g, '');
                            const num = parseFloat(numStr);
                            obj[key] = isNaN(num) ? obj[key] : num;
                        }
                    });

                    if (typeof obj['North coordinate'] === 'number' && typeof obj['East coordinate'] === 'number') {
                        try {
                            const [lon, lat] = proj4("EPSG:32647", "WGS84", [obj['East coordinate'], obj['North coordinate']]);
                            obj.lat = lat; obj.lon = lon;
                        } catch (e) { console.error(e); }
                    }

                    const name = String(obj.Name || "").replace(/"/g, '').toUpperCase();
                    obj.type = name.includes('GCP') ? 'GCP' : name.includes('GCS') ? 'GCS' : name.includes('CP') ? 'CP' : 'Other';
                    obj.sortVal = getSortValue(obj.Date);
                    return obj;
                });
            };

            const fetchCloudData = async () => {
                setLoading(true);
                try {
                    const response = await fetch(`${BASE_SHEETS_URL}&t=${Date.now()}`);
                    const text = await response.text();
                    const rows = text.split(/\r?\n/).filter(line => line.trim() !== "");
                    const headers = parseCSVLine(rows[0]).map(h => h.trim());
                    const rawData = rows.slice(1).map(line => {
                        const values = parseCSVLine(line);
                        const obj = {};
                        headers.forEach((header, i) => { obj[header] = values[i] !== undefined ? values[i].trim() : ""; });
                        return obj;
                    });
                    setData(standardizeData(rawData));
                    setLastUpdated(new Date().toLocaleTimeString('th-TH'));
                    invalidateMap();
                } catch (err) { console.error(err); }
                setLoading(false);
            };

            useEffect(() => { fetchCloudData(); }, []);

            const filteredData = useMemo(() => {
                return data.filter(item => {
                    const matchesSearch = String(item.Name || '').toLowerCase().includes(searchTerm.toLowerCase());
                    const matchesDate = filterDate === 'All' || item.Date === filterDate;
                    const matchesType = filterType === 'All' || item.type === filterType;
                    return matchesSearch && matchesDate && matchesType;
                });
            }, [data, searchTerm, filterDate, filterType]);

            useEffect(() => {
                if (mapRef.current && markerGroupRef.current) {
                    markerGroupRef.current.clearLayers();
                    filteredData.forEach(p => {
                        if (p.lat && p.lon) {
                            const color = p.type === 'GCP' ? '#1e3a8a' : p.type === 'CP' ? '#2563eb' : '#00d1ff';
                            const marker = L.circleMarker([p.lat, p.lon], { radius: 7, fillColor: color, color: "#fff", weight: 2, fillOpacity: 0.9 });
                            marker.bindPopup(`<b>${p.Name}</b><br>Type: ${p.type}<br>Elev: ${p.Elevation?.toFixed(2)} m`);
                            markerGroupRef.current.addLayer(marker);
                        }
                    });
                    resetMapView();
                    invalidateMap();
                }
            }, [filteredData]);

            const stats = useMemo(() => {
                const total = data.length;
                const gcp = data.filter(d => d.type === 'GCP').length;
                const cp = data.filter(d => d.type === 'CP').length;
                const gcs = data.filter(d => d.type === 'GCS').length;
                const validElev = data.filter(d => typeof d.Elevation === 'number');
                const avgE = validElev.length > 0 ? validElev.reduce((s, c) => s + c.Elevation, 0) / validElev.length : 0;
                return { total, gcp, cp, gcs, elev: Math.round(avgE).toString() };
            }, [data]);

            const sortedChartData = useMemo(() => {
                const groups = {};
                data.forEach(d => {
                    const key = d.Date || 'N/A';
                    if (!groups[key]) {
                        groups[key] = { date: key, sortVal: getSortValue(key) };
                    }
                    groups[key][d.ReceiverNo] = (groups[key][d.ReceiverNo] || 0) + 1;
                });
                return Object.values(groups).sort((a, b) => a.sortVal - b.sortVal);
            }, [data]);

            const allRecs = useMemo(() => {
                const set = new Set(); data.forEach(d => set.add(d.ReceiverNo));
                return Array.from(set).sort();
            }, [data]);

            const pieData = useMemo(() => {
                const counts = {}; data.forEach(d => counts[d.ReceiverNo] = (counts[d.ReceiverNo] || 0) + 1);
                return Object.entries(counts).map(([name, value]) => ({ name, value }));
            }, [data]);

            const availableDates = useMemo(() => {
                const uniqueDates = Array.from(new Set(data.map(d => d.Date))).filter(Boolean);
                return uniqueDates.sort((a, b) => getSortValue(a) - getSortValue(b));
            }, [data]);

            return (
                <div className="min-h-screen p-6 lg:p-10">
                    <header className="max-w-7xl mx-auto mb-10 flex flex-col md:flex-row justify-between items-center gap-6">
                        <div className="flex items-center gap-6">
                            <div className="p-4 bg-indigo-700 rounded-[1.75rem] shadow-indigo-100 shadow-2xl flex items-center justify-center transition-transform hover:scale-105">
                                <Icon name="minimal-gnss" size={56} className="text-white" />
                            </div>
                            <div>
                                <h1 className="text-4xl font-black text-slate-800 tracking-tight leading-tight">Koh Tung Survey Point</h1>
                                <p className="text-slate-500 font-bold mt-1 uppercase text-sm tracking-wide">สำรวจระหว่างวันที่ 11-25 ก.พ. 69 และ 11-29 มี.ค. 69</p>
                            </div>
                        </div>
                        <button onClick={fetchCloudData} className="bg-white border border-slate-200 px-8 py-4 rounded-[1.5rem] font-black text-slate-700 hover:bg-slate-50 shadow-sm flex items-center gap-2 active:scale-95 transition-all">
                            <Icon name="refresh-cw" size={20} className={loading ? 'animate-spin' : ''} /> Refresh Data
                        </button>
                    </header>

                    <main className="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
                        <div className="lg:col-span-7 space-y-8">
                            {/* Stats Summary */}
                            <section className="grid grid-cols-2 md:grid-cols-5 gap-4">
                                <div className="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Total</p>
                                    <h3 className="text-4xl font-black">{stats.total}</h3>
                                </div>
                                <div className="bg-white p-6 rounded-[2rem] shadow-sm border-l-8 border-indigo-900">
                                    <p className="text-[10px] font-black text-indigo-900 uppercase tracking-widest mb-1">GCP</p>
                                    <h3 className="text-4xl font-black">{stats.gcp}</h3>
                                </div>
                                <div className="bg-white p-6 rounded-[2rem] shadow-sm border-l-8 border-blue-600">
                                    <p className="text-[10px] font-black text-blue-600 uppercase tracking-widest mb-1">CP</p>
                                    <h3 className="text-4xl font-black">{stats.cp}</h3>
                                </div>
                                <div className="bg-white p-6 rounded-[2rem] shadow-sm border-l-8 border-sky-400">
                                    <p className="text-[10px] font-black text-sky-500 uppercase tracking-widest mb-1">GCS</p>
                                    <h3 className="text-4xl font-black">{stats.gcs}</h3>
                                </div>
                                <div className="bg-slate-900 p-6 rounded-[2rem] shadow-xl flex flex-col justify-center">
                                    <p className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1 opacity-60">Avg Elev.</p>
                                    <h3 className="text-3xl font-black text-white">{stats.elev}m</h3>
                                </div>
                            </section>

                            {/* Survey Data Table Area */}
                            <section className="bg-white rounded-[2.5rem] shadow-premium border border-slate-100 overflow-hidden flex flex-col">
                                <div className="p-8 border-b border-slate-50 bg-slate-50/20">
                                    <h3 className="text-2xl font-black mb-6 tracking-tight text-slate-800">Survey Data Table</h3>
                                    
                                    {/* ปรับแถบเครื่องมือค้นหาให้อยู่ในบรรทัดเดียวกัน */}
                                    <div className="flex flex-col sm:flex-row items-stretch sm:items-center gap-3">
                                        <div className="relative flex items-center bg-white rounded-2xl px-4 border border-slate-200 flex-grow shadow-sm focus-within:border-indigo-400 transition-all">
                                            <Icon name="search" size={16} className="text-slate-400 mr-3" />
                                            <input type="text" placeholder="ค้นหาจุดสำรวจ..." className="bg-transparent border-none py-3.5 text-sm font-bold focus:ring-0 w-full outline-none" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                                        </div>
                                        
                                        <div className="relative flex items-center bg-white border border-slate-200 rounded-2xl px-4 shadow-sm hover:border-indigo-300 transition-all">
                                            <Icon name="filter" size={14} className="text-indigo-500 mr-2" />
                                            <select className="bg-transparent border-none py-3.5 pr-8 text-xs font-black text-slate-700 outline-none appearance-none cursor-pointer" value={filterType} onChange={(e) => setFilterType(e.target.value)}>
                                                <option value="All">ทุกประเภท</option>
                                                <option value="GCP">GCP เท่านั้น</option><option value="CP">CP เท่านั้น</option><option value="GCS">GCS เท่านั้น</option>
                                            </select>
                                        </div>
                                        
                                        <div className="relative flex items-center bg-white border border-slate-200 rounded-2xl px-4 shadow-sm hover:border-indigo-300 transition-all">
                                            <Icon name="calendar-days" size={14} className="text-slate-400 mr-2" />
                                            <select className="bg-transparent border-none py-3.5 pr-8 text-xs font-black text-slate-700 outline-none appearance-none cursor-pointer" value={filterDate} onChange={(e) => setFilterDate(e.target.value)}>
                                                <option value="All">ทุกวันที่</option>
                                                {availableDates.map(date => <option key={date} value={date}>{date}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                </div>

                                <div className="no-horizontal-scroll max-h-[640px] overflow-y-auto">
                                    <table className="w-full table-fixed text-left border-collapse">
                                        <thead className="sticky top-0 z-20 bg-white border-b border-slate-100 shadow-sm">
                                            <tr>
                                                <th className="w-[18%] p-6 text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Name</th>
                                                <th className="w-[25%] p-6 text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">UTM (N, E)</th>
                                                <th className="w-[12%] p-6 text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] text-center">Elev. (m)</th>
                                                <th className="w-[30%] p-6 text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Date & Receiver</th>
                                                <th className="w-[15%] p-6 text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] text-right">Actions</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-50">
                                            {filteredData.map((row, i) => (
                                                <tr key={i} className="table-row-hover transition-all group">
                                                    <td className="p-6">
                                                        <span className="font-black text-slate-900 block text-lg truncate group-hover:text-indigo-600 transition-colors">{row.Name}</span>
                                                        <span className={`inline-block mt-2 px-2.5 py-0.5 rounded-lg text-[9px] font-black uppercase tracking-widest shadow-sm ${row.type === 'GCP' ? 'bg-indigo-900 text-white' : row.type === 'CP' ? 'bg-blue-600 text-white' : 'bg-sky-500 text-white'}`}>{row.type}</span>
                                                    </td>
                                                    <td className="p-6">
                                                        <div className="flex flex-col gap-2 font-mono-custom text-[11px]">
                                                            <div className="flex items-center gap-3"><span className="text-blue-600 font-bold w-3">N</span> <span className="text-slate-700 font-medium">{row['North coordinate']?.toLocaleString(undefined, {minimumFractionDigits: 3})}</span></div>
                                                            <div className="flex items-center gap-3"><span className="text-slate-400 font-bold w-3">E</span> <span className="text-slate-700 font-medium">{row['East coordinate']?.toLocaleString(undefined, {minimumFractionDigits: 3})}</span></div>
                                                        </div>
                                                    </td>
                                                    <td className="p-6 text-center">
                                                        <span className="font-black text-slate-800 text-lg">{row.Elevation?.toFixed(2)}</span>
                                                    </td>
                                                    <td className="p-6">
                                                        <div className="flex flex-col gap-2.5">
                                                            <div className="flex items-center gap-2.5 text-[11px] font-bold text-slate-600">
                                                                <div className="p-1.5 bg-slate-100 rounded-lg group-hover:bg-indigo-50 transition-colors"><Icon name="calendar-days" size={14} className="text-slate-400" /></div>
                                                                {row.Date}
                                                            </div>
                                                            <div className="flex items-center gap-2.5 text-[11px] font-black text-indigo-700">
                                                                <div className="p-1.5 bg-indigo-50 rounded-lg"><Icon name="database" size={14} className="text-indigo-600" /></div>
                                                                RECEIVER #{row.ReceiverNo}
                                                            </div>
                                                        </div>
                                                    </td>
                                                    <td className="p-6 text-right">
                                                        <div className="flex items-center justify-end gap-2.5">
                                                            <button onClick={() => { mapRef.current.flyTo([row.lat, row.lon], 18); window.scrollTo({top: 0, behavior: 'smooth'}); }} className="p-3 bg-white border border-slate-100 text-blue-600 rounded-2xl shadow-sm hover:bg-blue-600 hover:text-white transition-all active:scale-90" title="ดูในแผนที่"><Icon name="map-pin" size={18} /></button>
                                                            {row.DriveUrl && (
                                                                <button onClick={() => window.open(row.DriveUrl, '_blank')} className="p-3 bg-slate-900 text-white rounded-2xl shadow-sm hover:bg-indigo-600 transition-all active:scale-90" title="เปิดรูปถ่าย"><Icon name="external-link" size={18} /></button>
                                                            )}
                                                        </div>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </section>
                        </div>

                        {/* Map Preview Area */}
                        <div className="lg:col-span-5 map-container">
                            <div className="bg-white p-2 rounded-[2.5rem] shadow-premium border border-slate-100 h-full relative overflow-hidden">
                                <div id="map"></div>
                                <div className="map-status-pill">
                                    <div className="w-2.5 h-2.5 rounded-full bg-blue-600 animate-pulse"></div>
                                    <span className="text-[10px] font-black text-slate-600 uppercase tracking-widest">Survey Map Active</span>
                                </div>
                            </div>
                        </div>
                    </main>

                    {/* Charts Area */}
                    <section className="max-w-7xl mx-auto mt-12 grid grid-cols-1 lg:grid-cols-3 gap-8 pb-20">
                        <div className="lg:col-span-2 bg-white p-10 rounded-[3rem] shadow-premium border border-slate-50">
                            <div className="flex items-center gap-4 mb-10">
                                <div className="p-3 bg-indigo-50 rounded-2xl text-indigo-700"><Icon name="trending-up" size={24} /></div>
                                <div>
                                    <h3 className="text-xl font-black text-slate-800 tracking-tight">Daily Survey Points</h3>
                                    <p className="text-xs text-slate-400 font-bold uppercase tracking-widest mt-1">จำนวนจุดสำรวจรายวัน (เรียงตามลำดับเวลา)</p>
                                </div>
                            </div>
                            <div className="h-[350px]">
                                <ResponsiveContainer width="100%" height="100%">
                                    <BarChart data={sortedChartData}>
                                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                        <XAxis dataKey="date" axisLine={false} tickLine={false} tick={{ fontSize: 11, fontWeight: 700, fill: '#94a3b8' }} dy={10} />
                                        <YAxis axisLine={false} tickLine={false} tick={{ fontSize: 11, fontWeight: 700, fill: '#94a3b8' }} />
                                        <Tooltip cursor={{ fill: '#f8fafc' }} contentStyle={{ borderRadius: '16px', border: 'none', boxShadow: '0 10px 15px rgba(0,0,0,0.1)' }} />
                                        <Legend verticalAlign="top" align="right" iconType="circle" wrapperStyle={{ paddingBottom: '30px', fontSize: '12px', fontWeight: 800 }} />
                                        {allRecs.map((r, i) => (
                                            <Bar key={r} dataKey={r} stackId="a" fill={RECEIVER_COLORS[i % RECEIVER_COLORS.length]} barSize={28} />
                                        ))}
                                    </BarChart>
                                </ResponsiveContainer>
                            </div>
                        </div>
                        <div className="bg-white p-10 rounded-[3rem] shadow-premium border border-slate-50 flex flex-col">
                            <div className="flex items-center gap-4 mb-10">
                                <div className="p-3 bg-emerald-50 rounded-2xl text-emerald-700"><Icon name="pie-chart" size={24} /></div>
                                <div>
                                    <h3 className="text-xl font-black text-slate-800 tracking-tight">Receiver Utilization</h3>
                                    <p className="text-xs text-slate-400 font-bold uppercase tracking-widest mt-1">เครื่องมือรับสัญญาณทั้งหมด</p>
                                </div>
                            </div>
                            <div className="h-[350px] flex-grow">
                                <ResponsiveContainer width="100%" height="100%">
                                    <PieChart>
                                        <Pie data={pieData} innerRadius={75} outerRadius={115} paddingAngle={8} dataKey="value" stroke="none">
                                            {pieData.map((e, i) => <Cell key={i} fill={RECEIVER_COLORS[i % RECEIVER_COLORS.length]} />)}
                                        </Pie>
                                        <Tooltip contentStyle={{ borderRadius: '16px', border: 'none' }} />
                                        <Legend verticalAlign="bottom" iconType="circle" wrapperStyle={{ paddingTop: '20px', fontSize: '12px', fontWeight: 800 }} />
                                    </PieChart>
                                </ResponsiveContainer>
                            </div>
                        </div>
                    </section>

                    <footer className="max-w-7xl mx-auto text-center text-slate-300 text-[10px] pb-10 font-black uppercase tracking-[0.4em]">Koh Tung Project &bull; Field Data Platform 2026</footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
