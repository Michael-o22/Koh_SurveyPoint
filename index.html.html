<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koh Tung - Survey Point Platform</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <!-- Prop-Types -->
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Recharts -->
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+Thai:wght@300;400;700;800&display=swap');
        
        body { 
            font-family: 'Inter', 'Noto Sans Thai', sans-serif; 
            -webkit-font-smoothing: antialiased;
            letter-spacing: -0.01em;
        }
        .font-black { font-weight: 900; }
        .shadow-premium { box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.04), 0 4px 10px -4px rgba(0, 0, 0, 0.02); }
        
        .sticky-header th {
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
        }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#fcfdfe]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;
        const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer } = Recharts;

        const BASE_SHEETS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRo7_oH2qCTWXlnejCHS7-4VAqmQasQ3oF3N2vBfiefz7xVFfZy3iamOwDH9bizLsUWcAaxZeIKZUxt/pub?gid=549658327&single=true&output=csv";

        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                'layout-dashboard': <path d="M3 3h7v9H3zm11 0h7v5h-7zm0 9h7v9h-7zm-11 10h7v-7H3z"/>,
                'refresh-cw': <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8m0 0V3m0 5h-5M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16m0 0v5m0-5h5"/>,
                'search': <><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></>,
                'calendar-days': <><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><path d="M16 2v4M8 2v4m-5 4h18m-13 4h.01m3.99 0h.01m3.99 0h.01m-12 4h.01m3.99 0h.01m3.99 0h.01"/></>,
                'database': <><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5V19A9 3 0 0 0 21 19V5M3 12A9 3 0 0 0 21 12"/></>,
                'link': <><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></>,
                'external-link': <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6m4-3h6v6m-11 5L21 3"/>,
                'alert-circle': <><circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/></>,
                'cloud-check': <><path d="M17.5 19h.5a4 4 0 0 0 0-8h-1.3A7 7 0 1 0 3 13a4 4 0 0 0 4 4h.5"/><path d="m9 13 2 2 4-4"/></>,
                'filter': <path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3z"/>,
                'loader': <path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83"/>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const App = () => {
            const [data, setData] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [filterDate, setFilterDate] = useState('All');
            const [filterType, setFilterType] = useState('All');
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [lastUpdated, setLastUpdated] = useState(null);

            const monthNamesThai = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];

            const processDateSmart = (dateStr) => {
                if (!dateStr) return { display: 'ไม่ระบุ', sortValue: 0 };
                const cleanStr = String(dateStr).trim();
                const parts = cleanStr.split(/[-/\s]+/);
                let day = parts[0];
                let monthPart = parts[1];
                let yearPart = parts[2] || "69";
                const monthMap = { 'ม.ค.': 0, 'ก.พ.': 1, 'มี.ค.': 2, 'เม.ย.': 3, 'พ.ค.': 4, 'มิ.ย.': 5, 'ก.ค.': 6, 'ส.ค.': 7, 'ก.ย.': 8, 'ต.ค.': 9, 'พ.ย.': 10, 'ธ.ค.': 11 };
                if (!isNaN(monthPart) && monthPart.length > 0 && monthPart.length <= 2) {
                    const monthIdx = parseInt(monthPart) - 1;
                    return { display: `${day} ${monthNamesThai[monthIdx] || monthPart} ${yearPart.slice(-2)}`, sortValue: new Date(2026, monthIdx, parseInt(day)).getTime() };
                }
                const monthIdx = monthMap[monthPart];
                if (monthIdx !== undefined) return { display: `${day} ${monthNamesThai[monthIdx]} ${yearPart.slice(-2)}`, sortValue: new Date(2026, monthIdx, parseInt(day)).getTime() };
                return { display: cleanStr, sortValue: Date.now() };
            };

            const sanitizeUrl = (url) => {
                if (!url || typeof url !== 'string') return "";
                let clean = url.replace(/"/g, '').trim();
                const match = clean.match(/https?:\/\/[^\s]+/);
                return match ? match[0] : "";
            };

            const parseCSVLine = (line) => {
                const result = [];
                let curVal = "";
                let inQuotes = false;
                for (let i = 0; i < line.length; i++) {
                    const char = line[i];
                    if (char === '"' && line[i+1] === '"') { curVal += '"'; i++; } 
                    else if (char === '"') { inQuotes = !inQuotes; } 
                    else if (char === ',' && !inQuotes) { result.push(curVal); curVal = ""; } 
                    else { curVal += char; }
                }
                result.push(curVal);
                return result;
            };

            const standardizeData = (rawArray) => {
                return rawArray.map(item => {
                    const obj = { ...item };
                    const photoKey = Object.keys(obj).find(k => k.toLowerCase().includes('photo') || k.toLowerCase().includes('link') || k.includes('รูป'));
                    obj.DriveUrl = sanitizeUrl(obj[photoKey]);
                    ['North coordinate', 'East coordinate', 'Elevation'].forEach(key => {
                        if (obj[key] !== undefined) {
                            const numStr = String(obj[key]).replace(/,/g, '').replace(/"/g, '');
                            const num = parseFloat(numStr);
                            obj[key] = isNaN(num) ? obj[key] : num;
                        }
                    });
                    const dateInfo = processDateSmart(obj.Date);
                    obj.DateDisplay = dateInfo.display;
                    obj.DateSortValue = dateInfo.sortValue;
                    const name = String(obj.Name || "").replace(/"/g, '').toUpperCase();
                    if (name.includes('GCP')) obj.type = 'GCP';
                    else if (name.includes('GCS')) obj.type = 'GCS';
                    else if (name.includes('CP')) obj.type = 'CP';
                    else obj.type = 'Other';
                    return obj;
                });
            };

            const fetchCloudData = async () => {
                setLoading(true);
                setError(null);
                try {
                    const response = await fetch(`${BASE_SHEETS_URL}&t=${Date.now()}`);
                    if (!response.ok) throw new Error("ไม่สามารถเข้าถึงข้อมูลได้");
                    const text = await response.text();
                    const rows = text.split(/\r?\n/).filter(line => line.trim() !== "");
                    if (rows.length === 0) throw new Error("ไฟล์ว่างเปล่า");
                    const headers = parseCSVLine(rows[0]).map(h => h.trim());
                    const rawData = rows.slice(1).map(line => {
                        const values = parseCSVLine(line);
                        const obj = {};
                        headers.forEach((header, i) => { obj[header] = values[i] !== undefined ? values[i].trim() : ""; });
                        return obj;
                    });
                    setData(standardizeData(rawData));
                    setLastUpdated(new Date().toLocaleTimeString('th-TH'));
                } catch (err) {
                    setError(err.message === "Failed to fetch" ? "เบราว์เซอร์บล็อกการโหลดข้อมูลจากเครื่อง (CORS) กรุณาอัปโหลดไฟล์ขึ้นเว็บเพื่อใช้งาน" : err.message);
                }
                setLoading(false);
            };

            useEffect(() => { fetchCloudData(); }, []);

            const filteredData = useMemo(() => {
                return data.filter(item => {
                    const name = String(item.Name || '').toLowerCase();
                    const matchesSearch = name.includes(searchTerm.toLowerCase());
                    const matchesDate = filterDate === 'All' || item.DateDisplay === filterDate;
                    const matchesType = filterType === 'All' || item.type === filterType;
                    return matchesSearch && matchesDate && matchesType;
                });
            }, [data, searchTerm, filterDate, filterType]);

            const stats = useMemo(() => {
                const total = data.length;
                if (total === 0) return { total: 0, gcp: 0, cp: 0, gcs: 0, elev: '0.00' };
                const gcp = data.filter(d => d.type === 'GCP').length;
                const cp = data.filter(d => d.type === 'CP').length;
                const gcs = data.filter(d => d.type === 'GCS').length;
                const elevP = data.filter(d => typeof d.Elevation === 'number');
                const avgE = elevP.length > 0 ? elevP.reduce((a, b) => a + b.Elevation, 0) / elevP.length : 0;
                return { total, gcp, cp, gcs, elev: avgE.toFixed(2) };
            }, [data]);

            return (
                <div className="min-h-screen p-6 lg:p-10 text-slate-900">
                    <header className="max-w-7xl mx-auto mb-12">
                        <div className="flex flex-col md:flex-row md:items-center justify-between gap-6">
                            <div className="flex items-center gap-6">
                                <div className="p-4 bg-indigo-600 rounded-[1.75rem] shadow-indigo-100 shadow-2xl">
                                    <Icon name="layout-dashboard" size={36} className="text-white" />
                                </div>
                                <div>
                                    <h1 className="text-4xl font-black text-slate-800 tracking-tight leading-tight">Koh Tung Survey Point</h1>
                                    <div className="flex items-center gap-2 mt-2">
                                        {error ? (
                                            <span className="flex items-center gap-1.5 text-red-600 text-[11px] font-black uppercase tracking-[0.1em] bg-red-50 px-3 py-1 rounded-xl">
                                                <Icon name="alert-circle" size={12} /> Connection Error
                                            </span>
                                        ) : (
                                            <span className="flex items-center gap-1.5 text-emerald-600 text-[11px] font-black uppercase tracking-[0.1em] bg-emerald-50 px-3 py-1 rounded-xl">
                                                <Icon name="cloud-check" size={12} /> {loading ? "Syncing..." : "Sync Online"}
                                            </span>
                                        )}
                                        <span className="text-slate-400 text-xs font-medium">{lastUpdated ? `อัปเดต: ${lastUpdated}` : "ยังไม่ได้โหลดข้อมูล"}</span>
                                    </div>
                                </div>
                            </div>
                            <button onClick={fetchCloudData} disabled={loading} className="flex items-center gap-3 bg-white border border-slate-100 text-slate-700 px-8 py-4 rounded-[1.5rem] text-sm font-black hover:bg-slate-50 transition-all shadow-premium active:scale-95">
                                <Icon name="refresh-cw" size={20} className={loading ? 'animate-spin' : ''} />
                                Refresh Data
                            </button>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto">
                        {error && (
                            <div className="mb-10 p-6 bg-red-50 border-2 border-red-100 rounded-[2rem] flex items-center gap-4 text-red-800 animate-in fade-in zoom-in duration-300">
                                <Icon name="alert-circle" size={32} className="text-red-500 shrink-0" />
                                <div>
                                    <h4 className="font-black text-lg">ตรวจพบข้อผิดพลาด</h4>
                                    <p className="text-sm font-bold opacity-80">{error}</p>
                                </div>
                            </div>
                        )}

                        <section className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6 mb-12">
                            <div className="bg-white p-8 rounded-[2.5rem] shadow-premium flex flex-col justify-center">
                                <p className="text-slate-400 text-[11px] font-black uppercase tracking-[0.2em] mb-3">Total Points</p>
                                <h3 className="text-6xl font-black text-slate-900 tracking-tighter leading-none">{stats.total}</h3>
                            </div>
                            <div className="bg-white p-8 rounded-[2.5rem] shadow-premium border-l-8 border-indigo-500 flex flex-col justify-center">
                                <p className="text-indigo-500 text-[11px] font-black uppercase tracking-[0.2em] mb-3">GCP</p>
                                <h3 className="text-6xl font-black text-slate-900 tracking-tighter leading-none">{stats.gcp}</h3>
                            </div>
                            <div className="bg-white p-8 rounded-[2.5rem] shadow-premium border-l-8 border-emerald-500 flex flex-col justify-center">
                                <p className="text-emerald-500 text-[11px] font-black uppercase tracking-[0.2em] mb-3">CP</p>
                                <h3 className="text-6xl font-black text-slate-900 tracking-tighter leading-none">{stats.cp}</h3>
                            </div>
                            <div className="bg-white p-8 rounded-[2.5rem] shadow-premium border-l-8 border-amber-500 flex flex-col justify-center">
                                <p className="text-amber-500 text-[11px] font-black uppercase tracking-[0.2em] mb-3">GCS</p>
                                <h3 className="text-6xl font-black text-slate-900 tracking-tighter leading-none">{stats.gcs}</h3>
                            </div>
                            <div className="bg-slate-900 p-8 rounded-[2.5rem] shadow-2xl col-span-2 md:col-span-1 flex flex-col justify-center">
                                <p className="text-slate-500 text-[11px] font-black uppercase tracking-[0.2em] mb-3 opacity-60">Avg Elev.</p>
                                <h3 className="text-5xl font-black text-white tracking-tighter leading-none">{stats.elev}<span className="text-lg ml-1 font-medium opacity-40">m</span></h3>
                            </div>
                        </section>

                        <section className="bg-white rounded-[3rem] shadow-premium overflow-hidden border border-slate-50">
                            <div className="p-10 flex flex-col lg:flex-row lg:items-center justify-between gap-8 bg-slate-50/10">
                                <div><h3 className="text-2xl font-black text-slate-800">Survey Point Table</h3><p className="text-xs text-slate-400 font-bold uppercase tracking-[0.1em] mt-1">รายละเอียดจุดสำรวจล่าสุดจากระบบ Cloud</p></div>
                                <div className="flex flex-wrap items-center gap-4">
                                    <div className="relative flex items-center bg-white rounded-2xl px-5 py-0.5 shadow-sm border border-slate-50">
                                        <Icon name="filter" size={18} className="text-indigo-500 mr-3" />
                                        <select className="bg-transparent border-none py-4 pr-10 text-sm text-slate-700 font-black focus:ring-0 cursor-pointer appearance-none" value={filterType} onChange={(e) => setFilterType(e.target.value)}><option value="All">All Types</option><option value="GCP">GCP Only</option><option value="CP">CP Only</option><option value="GCS">GCS Only</option></select>
                                    </div>
                                    <div className="relative group"><Icon name="search" size={18} className="absolute left-5 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-indigo-600 transition-colors" /><input type="text" placeholder="Search points..." className="pl-14 pr-6 py-4 bg-white border border-slate-50 rounded-2xl text-sm font-black focus:ring-4 focus:ring-indigo-50/50 transition-all w-full md:w-56" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} /></div>
                                </div>
                            </div>
                            
                            <div className="overflow-x-auto max-h-[800px] overflow-y-auto">
                                <table className="w-full text-left border-collapse">
                                    <thead className="sticky top-0 z-10 sticky-header border-b border-slate-100 shadow-sm"><tr><th className="px-10 py-6 text-[11px] font-black text-slate-400 uppercase tracking-[0.25em]">Point Name</th><th className="px-10 py-6 text-[11px] font-black text-slate-400 uppercase tracking-[0.25em]">Coordinate (N, E)</th><th className="px-10 py-6 text-[11px] font-black text-slate-400 uppercase tracking-[0.25em]">Survey Date</th><th className="px-10 py-6 text-[11px] font-black text-slate-400 uppercase tracking-[0.25em]">Receiver</th><th className="px-10 py-6 text-[11px] font-black text-slate-400 uppercase tracking-[0.25em] text-right">Drive Link</th></tr></thead>
                                    <tbody className="divide-y divide-slate-50">
                                        {loading ? (
                                            <tr><td colSpan="5" className="px-10 py-56 text-center"><div className="flex flex-col items-center gap-6"><Icon name="loader" size={60} className="text-indigo-400 animate-spin" /><p className="text-slate-400 italic font-black text-2xl tracking-tight">กำลังซิงค์ข้อมูลจาก Cloud...</p></div></td></tr>
                                        ) : filteredData.length > 0 ? filteredData.map((row, idx) => (
                                            <tr key={idx} className="hover:bg-indigo-50/30 transition-all group">
                                                <td className="px-10 py-8"><span className="font-black text-slate-800 text-xl block leading-none tracking-tighter">{row.Name}</span><span className={`inline-block mt-3 px-3 py-1 rounded-xl text-[10px] font-black uppercase tracking-[0.1em] shadow-sm ${row.type === 'GCP' ? 'bg-indigo-600 text-white' : row.type === 'CP' ? 'bg-emerald-500 text-white' : 'bg-amber-400 text-white'}`}>{row.type}</span></td>
                                                <td className="px-10 py-8"><div className="flex flex-col gap-2 font-mono text-slate-700"><span className="text-base flex items-center gap-4"><span className="opacity-20 font-black w-4 text-xs">N</span> <span className="font-bold">{typeof row['North coordinate'] === 'number' ? row['North coordinate'].toLocaleString(undefined, {minimumFractionDigits: 3}) : row['North coordinate']}</span></span><span className="text-base flex items-center gap-4"><span className="opacity-20 font-black w-4 text-xs">E</span> <span className="font-bold">{typeof row['East coordinate'] === 'number' ? row['East coordinate'].toLocaleString(undefined, {minimumFractionDigits: 3}) : row['East coordinate']}</span></span></div></td>
                                                <td className="px-10 py-8"><span className="inline-flex items-center gap-3 text-sm font-black text-slate-700 bg-white border border-slate-50 px-6 py-3 rounded-[1.5rem] shadow-sm"><Icon name="calendar-days" size={18} className="text-indigo-600" /> {row.DateDisplay}</span></td>
                                                <td className="px-10 py-8"><span className="text-sm font-black text-slate-500 flex items-center gap-3"><Icon name="database" size={18} className="text-slate-300" /> #{row['Reciver Number'] || row['Receiver Number'] || 'N/A'}</span></td>
                                                <td className="px-10 py-8 text-right">{row.DriveUrl ? (<button onClick={() => window.open(row.DriveUrl, '_blank')} className="inline-flex items-center justify-center gap-3 px-8 py-4 bg-slate-900 text-white rounded-[1.5rem] hover:bg-indigo-600 transition-all shadow-lg active:scale-95 group/btn"><Icon name="link" size={18} className="group-hover/btn:rotate-12 transition-transform" /><span className="text-xs font-black uppercase tracking-widest">Drive</span><Icon name="external-link" size={14} className="opacity-40" /></button>) : (<div className="flex items-center justify-end gap-3 text-[11px] text-slate-300 font-black italic"><Icon name="alert-circle" size={16} /> NO LINK</div>)}</td>
                                            </tr>
                                        )) : (
                                            <tr><td colSpan="5" className="px-10 py-56 text-center"><div className="flex flex-col items-center gap-6"><Icon name="alert-circle" size={80} className="text-slate-100" /><p className="text-slate-400 italic font-black text-2xl tracking-tight">ไม่พบข้อมูล หรือเกิดข้อผิดพลาดในการโหลด</p></div></td></tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </section>
                    </main>
                    <footer className="max-w-7xl mx-auto mt-28 text-center text-slate-300 text-[11px] pb-16 font-black uppercase tracking-[0.6em]">Koh Tung Project &bull; Universal Data System 2026</footer>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
